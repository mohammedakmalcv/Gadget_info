<!DOCTYPE html>
<html>
<head>
    <title>My Wishlist - Nexus Tech Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 20px; }
        .header-container { text-align: center; margin-bottom: 30px; }
        
        
        .wishlist-grid {
            display: flex; flex-wrap: wrap; gap: 20px; justify-content: center;
            max-width: 1000px; margin: 0 auto;
        }
        
        
        .wishlist-card {
            background: white; width: 250px; padding: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center; transition: transform 0.2s;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .wishlist-card:hover { transform: translateY(-5px); }
        
        
        .product-image { width: 100%; height: 150px; object-fit: contain; margin-bottom: 15px; }
        .product-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #333; text-decoration: none; display: block; }
        .product-name:hover { color: #007BFF; }
        .product-price { font-size: 16px; color: #28a745; font-weight: bold; margin-bottom: 15px; }
        
        
        .remove-btn {
            background-color: #dc3545; color: white; border: none;
            padding: 10px 15px; border-radius: 5px; cursor: pointer;
            font-weight: bold; width: 100%; transition: background-color 0.2s;
        }
        .remove-btn:hover { background-color: #c82333; }
        .back-link { display: block; text-align: center; margin-top: 40px; color: #007BFF; text-decoration: none; font-weight: bold; }
        .empty-state { text-align: center; font-size: 18px; color: #666; margin-top: 50px; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1> Wishlisted Items </h1>
    </div>

    {% if wishlist_items %}
        <div class="wishlist-grid">
        {% for item in wishlist_items %}
            <div class="wishlist-card">
                
                <a href="{% url 'product_detail' item.product.id %}">
                    <img src="{{ item.product.image_url }}" alt="{{ item.product.name }}" class="product-image">
                </a>
                
                <a href="{% url 'product_detail' item.product.id %}" class="product-name">
                    {{ item.product.name }}
                </a>
                
                <div class="product-price">₹{{ item.product.price }}</div>
                
                <form action="{% url 'toggle_wishlist' item.product.id %}" method="POST" style="margin-top: auto;">
                    {% csrf_token %}
                    <button type="submit" class="remove-btn">Remove Item</button>
                </form>
                
            </div>
        {% endfor %}
        </div>
    {% else %}
        <div class="empty-state">
            <p>Your wishlist is currently empty!</p>
            <a href="{% url 'home' %}" style="display: inline-block; margin-top: 15px; padding: 10px 20px; background-color: #007BFF; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">Browse Gadgets</a>
        </div>
    {% endif %}

    <a href="{% url 'home' %}" class="back-link">← Back to Tracker Dashboard</a>

</body>
</html>
