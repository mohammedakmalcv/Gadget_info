<!DOCTYPE html>
<html>
<head>
    <title>Sign Up - Nexus</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 320px;
            text-align: center;
        }
        input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 15px;
        }
        button:hover {
            background-color: #218838;
        }
        .helptext {
            font-size: 0.8em;
            color: #666;
            display: block;
            margin-top: -5px; 
            margin-bottom: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Create an Account</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Sign Up</button>
        </form>
        <p style="margin-top: 20px; font-size: 0.9em;">
            Already have an account? <a href="{% url 'login' %}">Log In Here</a>
        </p>
    </div>

</body>
</html>
